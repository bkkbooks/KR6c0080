  text: 金剛般若經疏記會編序一切眾生自性般若與諸佛平等眾生唯妄執未謝故波迸六道甘淪溺而不之返世尊為說一切修多羅不過令其於己躬下證其本有如是之事而已然諸契經演說不同有曲有直有純有雜唯金剛般若一經破執斷疑最為直說純說者也此經總之則一析之有三種一曰實相般若如金之堅即理經也二曰觀照般若如金之利即行經也三曰文字般若如金之光即教經也利根圓獲鈍者淺執昔六祖大師聞客誦至應無所住而生其心中峯老人讀至荷擔如來阿耨多羅三藐三菩提豁然悟入此頓見實相最上利根也其次則明觀照又次則信文字至於但信文字根斯為下矣然末世頓入者少故理由行證行藉教明則文字實又二種般若之津筏也是經文則甚略而義該大部入位上流乍難窺測然自創譯已來此方疏釋約數百家深經淺解已謂少益況偏辭臆說至有不堪聞見者乎昔佛滅後西域有無著菩薩入日光定上升兜率詣彌勒問此經義彌勒以八十偈頌之無著出定與其弟天親各稟偈造論二論互釋經旨彌深仍非淺智所了唐圭山大師以妙悟之姿泳遊教海愍物興慈遂正本二論旁采諸說述纂要疏二卷辭精理極為眾釋中最然一往讀之不了者什猶六七石壁師別為廣解又失之太繁長水師復起而翦削之成刊定記而疏義顯矣疏義顯而後金剛般若教行理三經乃無不顯矣但今宇內謬解偏多傳講諸師又恒習世本各封己見以故鮮知宗尚嗟乎獨不思聖凡愚智藐若雲泥無著是登地菩薩天親是地前加行菩薩二人親稟彌勒彌勒是補處大士親稟釋尊今疏悉依二論則疏即佛語佛語不宗將誰宗乎䇿昔因閱藏幸遇斯文精研三復如獲重寶但以疏記別行尋討維艱文義連綿科章間錯起止血脉作者猶迷於是不量庸愚秉筆從事校經節疏會記編科繕寫嚴覈至三脫其稿於中添削釐合殊費斟裁俾覽者無神昏目眩之嫌有執謝疑除之益特授剞劂以廣流傳或曰子禪者也乃事經疏之學耶予曰噫子過矣請無遠論即圭山長水二師一則宗大鑑而徹禪源一則叩琅邪而悟心要亦皆續教內之真傳即文字而直指苟具正眼豈存二見況此般若者乃覺體之異名種智之殊號性空緣會法爾無差功德發心本無限齊吾將流通如是之經以期己他之兼利也流通文字用嚴化身流通觀照用嚴報身流通實相用嚴法身如是則為具足佛身何以故生了二因決能成就故經云是經義不可思議果報亦不可思議諸有福智者應作如是觀康熈甲辰歲仲夏之吉荊溪後學行䇿書於武林之河渚草堂金剛般若經疏記會編科文長水沙門子璿錄疏文分三初標題目二初經疏名題二作者嘉號二敘宗旨二初敘讚經旨二初通明起教之緣二初明迷真起妄二初真空二妄有二明習妄流轉由是二別明說教之意二初敘說阿含之意二初正敘故我二結判既除二敘說般若之意二初總示大部二初敘教釋意欲盡二顯瑞彰會三千二別示今經二初略標指令之二廣敘讚二初敘嘆幽玄二初具敘一經詮旨三初正敘句偈二反顯不先三順結故雖二結嘆四法幽玄三初正結歎二示難了三彰謬解二引文結顯河沙二述造疏意二初示疏論師承有據二初二論師承斥他添削且天二示今述解不攻異端故今二示名題義意在下纂要三解本文二初偈文皈請稽首二開章正釋二初標列章門將釋二依章正釋四初辯教起因緣二初總論諸教二初通赴機緣初中二克就佛意若據二別顯此經五初對治我法二執三初標後別二釋二初總標由執起障由此二別示一障過患二初煩惱由煩二所知由所三結二執二遮斷種現二疑二初標二為二釋遮未三轉滅輕重二業二初標三為二釋轉重四顯示福慧二因三初標四為二釋二初未說失為凡小佛成二已說得為佛因二初順釋故談二反顯若無三結故須五發明真應二果三初標五為二釋未聞三結故此二明經宗躰二初明宗二初統明諸教第二二別顯今經三初約法正立別顯二約喻釋成以即三約行結顯萬行二明躰三初標立二躰二正釋文字三總結故皆三分別處會二初總明佛說大部處會二初總示大部第三二別顯此經此經二別明傳譯此卷時主三初正明東土翻譯前後二初通辯諸譯後別二剋示所傳今所二因辨西方解釋異同天竺三示今科判依據差別二初正明科釋所依今科二結成立題所以題云四釋通文義二初解題目疏二初釋所詮三初釋金剛二初翻名示相金剛二約法辨義二初引經論總彰二義三初總標略辯極堅二引教委釋涅槃三結顯喻旨皆以二引真諦別示六種二初正明六種又真二結示傍正傍兼二釋般若二初翻名略指般若二引教廣釋二初引論別相釋二初明總攝三慧若約二引論文釋成二初正釋成故無二配因果二初双引論又云二双解釋則聞二引經通相釋若依三釋波羅蜜三初約語對翻波羅二約義順釋二初釋義謂離二通難一切三順義通結若兼二釋能詮二初翻名經者二釋義契者二釋經文疏二釋經文疏二初科分後釋二隨釋經三初序分二初證信序疏三初明建立因釋此二明建立意二明三正釋文義二初標列述意三正二依科解文六初信成就二初合釋一信二單釋單釋二聞成就二初正釋我聞之義二聞二商較所聞之法阿難三時成就二初揀顯釋三時二會法釋又說四主成就二初翻名四主二釋義二初引論正釋二初約體離念釋起信二約位三義釋然覺二引論反釋三初反顯故知二引證起信三順結又云五處成就二初釋舍衛五處二釋祗園二初總指祗樹二別釋三初釋祗陀祗陀二釋給孤梵語三釋園字西國六眾成就二初釋標類六眾二釋舉數千二二發起序疏二初敘意二發二隨釋經二初戒疏七初釋化主分七二釋化時二化三釋化儀三化四釋化處四化五釋化事五化六釋化等六化七釋化終七化二定疏二初正解此文三初併資緣分二二淨身業二淨三正入定三正二通前表法二初約大雲廣辨三初標然大二釋二初表通序表本二表別序覺心三結欲談二引資聖略明二初正明資聖二引證故涅二正宗分三流通分二正說分疏二初標列章門第二二依章隨釋二初約無著七種義句以懸判三初正示七句七初種性初中二發起二發三住處三行四對治四對五不失五不六地位六地七立名七名二總指後四後四三廣釋第三三初正辨十八住處十八初發心住十八二波羅蜜相應住二波三欲得色身住二欲四欲得法身住四欲五修道無慢住三初正示此文五於二通敘後段從此三別結對治今當六不離佛世住六不七願淨佛土住七願八成熟眾生住八成九遠離外論住九遠十觀破色身住十色十一給侍如來住十一十二遠離退失住十二十三忍苦住十三十四離寂靜味住十四十五證道離喜住十五十六求佛教授住十六十七證道住十七十八求佛地住六初國土淨具足十八二見智淨具足二無三福自在具足三福四無上身具足四身五無上語具足五語六無上心具足六心二重以八義相攝又十三更約地位配釋十八二依天親問答斷疑以科釋二初牒章分文第一二依章正釋經四初善現申請二初整儀讚佛疏二初釋請人長老二釋請儀二初正釋經文從座二別解菩薩菩提二正發問端疏二初釋當機曲分二釋正問三初釋魏本二釋二會當經秦譯三引論證故無二如來讚許疏三初印讚所讚曲分二敕聽許說二敕三標勸將陳三標三善現佇聞四如來正說二初正答所問二初舉總標別以牒問疏四初正釋經文此以二斥他謬判有科三詳定經旨況詳四牒難釋通不別二約別顯總以答問二初答安住降心問四初廣大心疏二初釋標文二二釋列三初受生差別二初釋文若卯二通難卯劣二依止差別二依三境界差別二境二第一心三常心四不倒心二答修行降心問五初總標二別釋三總結四顯益疏二初科釋文意初句二別辨喻旨虛空五結勸二躡迹斷疑疏二初約論分文二躡二依論科釋經分二十七初斷求佛行施住相疑疏一初標章敘疑一斷二依經斷疑經四初舉疑因以問二防相得以酬三釋體異有為四印佛身為相疏二初釋前二句二初正釋非俱二引證故起二釋後二句二初正釋若見二引論釋四初引起信故起二引肇注肇云三引本論偈云四依無著無著二斷因果俱深無信疑疏二初隨章敘疑經二斷二依經斷疑經四初約無信以呈疑二呵疑詞以顯信三明能信之所以二初明歷事善友積集信因二明善友所攝成就信德二初明攝受得福顯福德門疏二初釋佛知見二釋得福德得福二明攝受所以顯智慧門疏二初敘意二明二科釋經二初正明已斷麤執疏二初節釋經文二商較經旨然離二因顯未除細執疏二初釋總明二相若心二釋別明二相二初正辨二相若取二別解徵意中有四示中道之玄門三斷無相云何得說疑疏二初隨章敘疑三斷二依經斷疑經二初問答斷疑四初舉疑因以問二順實理以酬三釋無定法之言疏二初引無著二引天親二初釋文論云二通難何故四釋無取說所以二校量顯勝四初舉劣福以問二釋福多以酬三判經福超過疏二初正釋經文二別示句相四句四釋超過所以二初正釋二轉釋四斷聲聞得果是取疑疏二初隨章敘疑四斷二依經斷疑經四初入流果疏三初正釋經文二商較果證然非三結斷疑情故知二一來果三不來果四不生果疏二初辨得名四不二分科釋經三初舉所得以問二明無取以答三引己證令信三初明佛先印二彰己不取三却釋佛意五斷釋迦然燈取說疑疏二初隨章敘疑五斷二依經斷疑六斷嚴土違於不取疑疏二初隨章敘疑六斷二依經斷疑經三初舉取相莊嚴問二釋離相莊嚴答三依淨心莊嚴勸七斷受得報身有取疑疏二初隨章指疑七斷二依經斷疑經二初問答斷疑疏二初總釋喻旨二別解非身二初牒經略指非身二引論廣釋二初引本偈故偈二引論文三初双標論云二双釋以唯三双結以是二校量顯勝二初約外財校量廣顯經勝二初校量勝劣三初約多河以辨沙二約多沙以彰福三約多福以顯勝二釋勝所以五初尊處嘆人勝三初明處可敬二顯人獲益三顯處有佛二約義辨名勝三佛無異說勝四施福劣塵勝五感果離相勝二約內財校量倍顯經勝二初校量勝劣二釋勝所以五初泣歎未聞深法勝二淨心契實具德勝二初正明二拂跡三信解三空同佛勝三初總標信解二別顯三空三如來印定四聞時不動希有勝五大因清淨第一勝八斷持說未脫苦果疑疏二初隨章敘疑八斷二依經斷疑經二初明超忍以斷疑二初明忍體二明忍相二初引一生證極苦忍二初正明二反顯二引多生證相續忍二勸離相以安忍疏二初引論敘意二勸二分文正釋經二初總標二別顯二初對治不忍流轉苦二對治不忍相違苦疏二初引無著顯意二約天親釋文論云九斷能證無體非因疑疏二初隨章敘疑九斷二依經斷疑經二初斷疑疏二初略銷經意二廣釋五語真語二離執十斷如遍有得無得疑二初隨章敘疑十斷二依經斷疑經二初舉喻斷疑二讚經功德二初總標二別顯十初捨命不如二初捨命福二信經福二餘乘不測三依大心說四具德能傳五樂小不堪六所在如塔七轉罪為佛八超事聖尊疏二初總敘意八超二別科釋經二初供佛多中全具福二持經多中少分福九具聞則疑十總結幽邃十一斷住修降伏見我疑疏二初隨章敘疑十一斷二依經斷疑經二初問二答三初若名菩薩必無我二若有我相非菩薩三能所俱寂是菩提十二斷佛因是有菩薩疑疏二初