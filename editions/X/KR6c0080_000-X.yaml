常義現於文易開物解者比也況加之以麤心淺心狥臆見妄生穿鑿何關經義故曰非思議能解也彌勒以補處之智冥妙覺之經演難思之偈授登地之人曰斷種種疑天親始理疑脈以貫經曰斷二十七種疑故曰無思議者乃能解也昔者以文求義予盾何多今也以脈定文參商斯絕違惟見其順塞惟見其通斷惟見其續暗惟見其明細心深心虗所見好古敏求之力也故曰非思議竟莫能解也好心學般若者當澄神攝慮熟翫而細研之將見此經全體血脈朗然躍現於文字句偈之表由是永斷羣疑深解義趣依解起行行起解絕不妨從思議中親到無思議處即是親見不思議人親聞不思議說也尚勉之哉例言此經六譯秦譯稱最傳布既廣譌舛滋多故校諸疏本亦各差互今經字句一依北藏原本勘正此經注釋無慮數百家雖有數家正疏然皆互有短長其盡善盡美唯纂要一疏而已故今疏文悉遵原本無敢移易其刊定記文既會歸本疏下首末開合不無增損字面貴使文義允當耳凡疏鈔合本多見以兩文竝書而首標疏鈔字者其不便有二一者遇條分縷析處標字太煩二則於義未安葢鈔不得與疏竝列猶之疏不得與經齊等譬如經則父也疏則子也鈔則孫也倫次自應有別今初二卷以疏文頂格書記低一字自三卷以去則以經文頂格書疏讓經一字記復讓疏一字不同他本之式又記中有釋經之語未涉疏意者會在疏前令不失次第此中分科須辨四種不同有記中所列之疏科有疏中所列之經科有疏中自列之疏科并節釋之經科重繁錯雜初學多迷今前二種皆加圈別之仍乃黑白使疏記首尾血脈通貫其後二種準疏文一例書之庶井然易見記中科題有遺前失後者竊意補之有應立不立者增入之有疏自列而記復列者翦削之或安科取便失次者隨位置之或科名未盡善者略更易數字非敢妄專務期允當覽者無以差脫見疑經文十八十九二疑之間有爾時慧命須菩提至是名眾生一段計六十二字秦譯原無係後人添入故疏不釋然魏譯有之二論亦皆釋之添亦無失況記有補釋之文今從世本添入如秦譯法華普門品中添入隋偈亦無失也配十八住處斷二十七疑為兩論之綱宗一經之樞要若階位不明則昧於橫判脈絡不清則迷於豎釋今各為圖說系於全科之後使開卷按圖瞭然在目不致尋文難了疏記兩文之中字句竝多錯謬北藏且不可憑何論他本今則揆之文義苟一字不安必周徧𢯱尋得之舊冊或深思自悟釋然無疑具摘諸譌附於卷末一以見讎勘之難一以出藏本之誤惟覽者悉之
